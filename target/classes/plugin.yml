name: BanHammer
version: '1.1.6'
main: fr.banhammer.BanHammerPlugin
api-version: '1.20'
prefix: BanHammer
authors: [TyniTV]
description: A plugin that adds a specialized Mace to ban players on hit.

commands:
  banhammer:
    description: Main command for BanHammer
    usage: /banhammer give <player>
    permission: banhammer.give
    permission-message: "<red>Vous n'avez pas la permission d'utiliser cette commande.</red>"
